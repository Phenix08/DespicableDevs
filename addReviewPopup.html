<div id="review-modal">
    <div id="review-modal-header">
        <h2 id="review-title">Add Review</h2>
        <button id="review-modal-close">&times;</button>
    </div>

    <div id="review-modal-content">

        <!-- 🔍 SEARCH INPUTS - AUTOCOMPLETE -->
        <div class="form-group mb-md-0">
            <label for="job-title-input">Job Title</label>
            <div class="autocomplete-wrapper">
                <input 
                    type="text" 
                    id="job-title-input" 
                    class="autocomplete-input"
                    placeholder="Search job title..."
                    autocomplete="off"
                />
                <div id="job-title-dropdown" class="autocomplete-dropdown"></div>
            </div>
        </div>

        <div class="form-group mb-md-0">
            <label for="company-input">Company</label>
            <div class="autocomplete-wrapper">
                <input 
                    type="text" 
                    id="company-input" 
                    class="autocomplete-input"
                    placeholder="Search company..."
                    autocomplete="off"
                />
                <div id="company-dropdown" class="autocomplete-dropdown"></div>
            </div>
        </div>

        <div class="form-group mb-md-0">
            <label for="location-input">Location</label>
            <div class="autocomplete-wrapper">
                <input 
                    type="text" 
                    id="location-input" 
                    class="autocomplete-input"
                    placeholder="Search location..."
                    autocomplete="off"
                />
                <div id="location-dropdown" class="autocomplete-dropdown"></div>
            </div>
        </div>

        <!-- ⭐ OVERALL RATING -->
        <div class="section-title">Overall Rating</div>
        <div class="stars-row" data-target="overall">
            <span data-value="1">★</span>
            <span data-value="2">★</span>
            <span data-value="3">★</span>
            <span data-value="4">★</span>
            <span data-value="5">★</span>
        </div>

        <!-- 📊 SUB RATINGS -->
        <div class="section-title">Detailed Ratings</div>

        <div class="sub-ratings-grid">

            <div class="rating-box">
                <label>Work Environment</label>
                <div class="stars-row" data-target="sub1">
                    <span data-value="1">★</span><span data-value="2">★</span>
                    <span data-value="3">★</span><span data-value="4">★</span>
                    <span data-value="5">★</span>
                </div>
            </div>

            <div class="rating-box">
                <label>Location</label>
                <div class="stars-row" data-target="sub2">
                    <span data-value="1">★</span><span data-value="2">★</span>
                    <span data-value="3">★</span><span data-value="4">★</span>
                    <span data-value="5">★</span>
                </div>
            </div>

            <div class="rating-box">
                <label>Communication</label>
                <div class="stars-row" data-target="sub3">
                    <span data-value="1">★</span><span data-value="2">★</span>
                    <span data-value="3">★</span><span data-value="4">★</span>
                    <span data-value="5">★</span>
                </div>
            </div>

            <div class="rating-box">
                <label>Flexibility</label>
                <div class="stars-row" data-target="sub4">
                    <span data-value="1">★</span><span data-value="2">★</span>
                    <span data-value="3">★</span><span data-value="4">★</span>
                    <span data-value="5">★</span>
                </div>
            </div>

        </div>

        <!-- 💬 COMMENT -->
        <div class="section-title">Comment</div>
        <textarea id="review-comment" placeholder="Write your experience..."></textarea>

        <!-- 🚀 BUTTON -->
        <div class="actions">
            <button id="save-review" class="btn-primary">
                ADD REVIEW
            </button>
        </div>

    </div>
</div>
