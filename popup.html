<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Review Popup</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            width: 300px;
            padding: 10px;
            margin: 0;
        }
        .stars {
            font-size: 24px;
            color: gold;
            margin-bottom: 5px;
        }
        .review-count {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
        }
        .rating-bars {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }
        .rating-bar {
            display: flex;
            flex-direction: column;
        }
        .bar-label {
            font-size: 12px;
            margin-bottom: 5px;
        }
        .bar {
            height: 8px;
            background-color: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
        }
        .bar-fill {
            height: 100%;
            background-color: #4CAF50;
            width: 80%; /* Example width, can be dynamic */
        }
        .comments-section {
            border-top: 1px solid #ccc;
            padding-top: 10px;
        }
        .comments-title {
            font-size: 16px;
            margin-bottom: 10px;
        }
        .comment {
            font-size: 14px;
            margin-bottom: 10px;
            padding: 5px;
            background-color: #f9f9f9;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="stars">★★★★★</div>
    <div class="review-count">Based on 42 reviews</div>
    
    <div class="rating-bars">
        <div class="rating-bar">
            <div class="bar-label">Location</div>
            <div class="bar">
                <div class="bar-fill" style="width: 85%;"></div>
            </div>
        </div>
        <div class="rating-bar">
            <div class="bar-label">Application Process</div>
            <div class="bar">
                <div class="bar-fill" style="width: 70%;"></div>
            </div>
        </div>
        <div class="rating-bar">
            <div class="bar-label">Team</div>
            <div class="bar">
                <div class="bar-fill" style="width: 90%;"></div>
            </div>
        </div>
        <div class="rating-bar">
            <div class="bar-label">Flexibility in Work Hours</div>
            <div class="bar">
                <div class="bar-fill" style="width: 75%;"></div>
            </div>
        </div>
    </div>
    
    <div class="comments-section">
        <div class="comments-title">Comments</div>
        <div class="comment">Great location and flexible hours!</div>
        <div class="comment">The team is amazing and supportive.</div>
        <div class="comment">Application process was straightforward.</div>
    </div>
</body>
</html>
